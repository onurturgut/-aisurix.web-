<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>aisurix.web | Cevrimdisi</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1120;
        --card: rgba(15, 23, 42, 0.88);
        --border: rgba(34, 211, 238, 0.2);
        --text: #e2e8f0;
        --muted: #94a3b8;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 28%),
          radial-gradient(circle at right bottom, rgba(0, 229, 168, 0.08), transparent 22%),
          var(--bg);
      }

      .card {
        width: min(100%, 560px);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        background: var(--card);
        backdrop-filter: blur(18px);
        box-shadow: 0 24px 80px rgba(34, 211, 238, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 3.2rem);
        line-height: 1;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 12px;
        color: #0b1120;
        background: linear-gradient(90deg, #22d3ee, #00e5a8);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Cevrimdisisin</h1>
      <p>Baglanti geri geldiginde tam deneyim geri donecek. Simdilik ana sayfaya donup tekrar deneyebilirsin.</p>
      <a href="/">Ana sayfaya don</a>
    </main>
  </body>
</html>
